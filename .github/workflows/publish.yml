name: Publish

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  check-tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Check release tag matches package version
        run: |
          version="$(awk '/^version:/ { print $2; exit }' pubspec.yaml)"
          expected_ref="refs/tags/v$version"
          if [ "$GITHUB_REF" != "$expected_ref" ]; then
            echo "Release tag $GITHUB_REF does not match pubspec version $version." >&2
            echo "Expected $expected_ref." >&2
            exit 1
          fi
          if ! grep -Fx "## $version" CHANGELOG.md >/dev/null; then
            echo "CHANGELOG.md is missing a ## $version release entry." >&2
            exit 1
          fi

  lower_bound:
    needs: check-tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.0'
          channel: stable
          cache: true

      - name: Install lower-bound package dependencies
        run: flutter pub get

      - name: Analyze package at lower bound
        run: flutter analyze --no-pub lib test

      - name: Test package at lower bound
        run: flutter test --no-pub test/motion_exporter_test.dart

  check-pub-version:
    needs: check-tag
    runs-on: ubuntu-latest
    outputs:
      version_exists: ${{ steps.pubdev.outputs.version_exists }}
    steps:
      - uses: actions/checkout@v5

      - name: Check whether this version already exists on pub.dev
        id: pubdev
        shell: bash
        run: |
          set -euo pipefail
          version="$(awk '/^version:/ { print $2; exit }' pubspec.yaml)"
          status="$(curl -L -s -o package.json -w '%{http_code}' https://pub.dev/api/packages/motion_exporter)"
          if [ "$status" = "404" ]; then
            echo "version_exists=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "$status" != "200" ]; then
            echo "pub.dev package lookup failed with HTTP $status." >&2
            exit 1
          fi
          export VERSION="$version"
          python3 - <<'PY'
          import json
          import os

          with open('package.json', encoding='utf-8') as file:
              package = json.load(file)

          version = os.environ['VERSION']
          versions = {entry['version'] for entry in package.get('versions', [])}
          exists = 'true' if version in versions else 'false'
          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as output:
              output.write(f'version_exists={exists}\n')
          PY

  release_verify:
    needs: check-tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Verify package
        run: |
          flutter pub get
          dart format --set-exit-if-changed .
          flutter analyze
          flutter test test/motion_exporter_test.dart

      - name: Validate package archive
        run: dart pub publish --dry-run

      - name: Verify example workflows
        working-directory: example
        run: |
          flutter pub get
          flutter analyze
          flutter build web --release --output build/web
          flutter build web --wasm --release --output build/web_wasm
          flutter test test/widget_test.dart test/motion_golden_workflow_test.dart test/generate_120fps_demo_test.dart
          MOTION_EXPORTER_BENCHMARK_JSON=output/benchmark.json flutter test tool/benchmark_exports.dart --reporter expanded
          dart run tool/validate_benchmark_json.dart output/benchmark.json

      - name: Upload motion golden failure artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: motion-golden-failures-${{ github.run_id }}
          path: |
            build/motion_failures
            example/build/motion_failures
          if-no-files-found: ignore

  linux_desktop:
    needs: check-tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Linux desktop dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev

      - name: Build example Linux desktop
        working-directory: example
        run: |
          flutter config --enable-linux-desktop
          flutter pub get
          flutter build linux --release

  macos_desktop:
    needs: check-tag
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Build example macOS desktop
        working-directory: example
        run: |
          flutter config --enable-macos-desktop
          flutter pub get
          flutter build macos --release

  windows_desktop:
    needs: check-tag
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Build example Windows desktop
        working-directory: example
        run: |
          flutter config --enable-windows-desktop
          flutter pub get
          flutter build windows --release

  android:
    needs: check-tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Build example Android debug APK
        working-directory: example
        run: |
          flutter pub get
          flutter build apk --debug

  ios:
    needs: check-tag
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Build example iOS simulator app
        working-directory: example
        run: |
          flutter pub get
          flutter build ios --simulator

  publish:
    if: needs.check-pub-version.outputs.version_exists != 'true'
    needs:
      - check-tag
      - check-pub-version
      - lower_bound
      - release_verify
      - linux_desktop
      - macos_desktop
      - windows_desktop
      - android
      - ios
    permissions:
      contents: read
      id-token: write
    uses: dart-lang/setup-dart/.github/workflows/publish.yml@v1
