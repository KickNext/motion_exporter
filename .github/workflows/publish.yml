name: Publish

on:
  push:
    tags:
      - 'v*'

jobs:
  check-tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check release tag matches package version
        run: |
          version="$(awk '/^version:/ { print $2; exit }' pubspec.yaml)"
          expected_ref="refs/tags/v$version"
          if [ "$GITHUB_REF" != "$expected_ref" ]; then
            echo "Release tag $GITHUB_REF does not match pubspec version $version." >&2
            echo "Expected $expected_ref." >&2
            exit 1
          fi
          if ! grep -Fx "## $version" CHANGELOG.md >/dev/null; then
            echo "CHANGELOG.md is missing a ## $version release entry." >&2
            exit 1
          fi

  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Verify package
        run: |
          flutter pub get
          dart format --set-exit-if-changed .
          flutter analyze
          flutter test test/motion_exporter_test.dart

      - name: Validate package archive
        run: dart pub publish --dry-run

      - name: Verify example workflows
        working-directory: example
        run: |
          flutter pub get
          flutter analyze
          flutter build web --release --output build/web
          flutter test test/widget_test.dart test/motion_golden_workflow_test.dart test/generate_120fps_demo_test.dart
          MOTION_EXPORTER_BENCHMARK_JSON=output/benchmark.json flutter test tool/benchmark_exports.dart --reporter expanded
          dart run tool/validate_benchmark_json.dart output/benchmark.json

  publish:
    needs:
      - check-tag
      - verify
    permissions:
      id-token: write
    uses: dart-lang/setup-dart/.github/workflows/publish.yml@v1
