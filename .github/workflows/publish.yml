name: Publish

on:
  push:
    tags:
      - 'v*'

jobs:
  check-tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Check release tag matches package version
        run: |
          version="$(awk '/^version:/ { print $2; exit }' pubspec.yaml)"
          expected_ref="refs/tags/v$version"
          if [ "$GITHUB_REF" != "$expected_ref" ]; then
            echo "Release tag $GITHUB_REF does not match pubspec version $version." >&2
            echo "Expected $expected_ref." >&2
            exit 1
          fi
          if ! grep -Fx "## $version" CHANGELOG.md >/dev/null; then
            echo "CHANGELOG.md is missing a ## $version release entry." >&2
            exit 1
          fi

  lower_bound:
    needs: check-tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.0'
          channel: stable
          cache: true

      - name: Install lower-bound package dependencies
        run: flutter pub get

      - name: Analyze package at lower bound
        run: flutter analyze --no-pub lib test

      - name: Test package at lower bound
        run: flutter test --no-pub test/motion_exporter_test.dart

  verify:
    needs: check-tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Verify package
        run: |
          flutter pub get
          dart format --set-exit-if-changed .
          flutter analyze
          flutter test test/motion_exporter_test.dart

      - name: Validate package archive
        run: dart pub publish --dry-run

      - name: Verify example workflows
        working-directory: example
        run: |
          flutter pub get
          flutter analyze
          flutter build web --release --output build/web
          flutter test test/widget_test.dart test/motion_golden_workflow_test.dart test/generate_120fps_demo_test.dart
          MOTION_EXPORTER_BENCHMARK_JSON=output/benchmark.json flutter test tool/benchmark_exports.dart --reporter expanded
          dart run tool/validate_benchmark_json.dart output/benchmark.json

  linux_desktop:
    needs: check-tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Linux desktop dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev

      - name: Build example Linux desktop
        working-directory: example
        run: |
          flutter config --enable-linux-desktop
          flutter pub get
          flutter build linux --release

  macos_desktop:
    needs: check-tag
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Build example macOS desktop
        working-directory: example
        run: |
          flutter config --enable-macos-desktop
          flutter pub get
          flutter build macos --release

  windows_desktop:
    needs: check-tag
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Build example Windows desktop
        working-directory: example
        run: |
          flutter config --enable-windows-desktop
          flutter pub get
          flutter build windows --release

  android:
    needs: check-tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Build example Android debug APK
        working-directory: example
        run: |
          flutter pub get
          flutter build apk --debug

  ios:
    needs: check-tag
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Build example iOS simulator app
        working-directory: example
        run: |
          flutter pub get
          flutter build ios --simulator

  publish:
    needs:
      - check-tag
      - lower_bound
      - verify
      - linux_desktop
      - macos_desktop
      - windows_desktop
      - android
      - ios
    permissions:
      id-token: write
    uses: dart-lang/setup-dart/.github/workflows/publish.yml@v1
